<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Mockup - Alerta Inteligente (AA-147)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .canvas {
            width: 1200px;
            height: 675px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            /* No shadow for clean PNG export if needed, or subtle shadow for depth */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Industrial Background - Clean and minimal */
        .industrial-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(6, 78, 59, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
            z-index: 1;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 2;
        }

        /* Phone frame */
        .phone-frame {
            width: 320px;
            height: 600px;
            background: #111;
            border-radius: 45px;
            padding: 10px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.12);
            position: relative;
            z-index: 10;
            border: 2px solid #1a1a1a;
        }

        .phone-screen {
            background: #f0f2f5;
            width: 100%;
            height: 100%;
            border-radius: 36px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* WhatsApp Header */
        .wa-header {
            background: #075e54;
            color: white;
            padding: 42px 16px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            background: #128c7e;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .wa-check {
            color: #25d366;
            margin-left: 4px;
        }

        /* Chat area */
        .wa-body {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: 400px;
            background-repeat: repeat;
        }

        .bubble {
            max-width: 90%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.45;
            position: relative;
            box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.1);
        }

        .bubble-left {
            background: white;
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .wa-timestamp {
            font-size: 10px;
            color: #667781;
            text-align: right;
            margin-top: 4px;
        }

        .wa-input {
            background: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-bar {
            background: white;
            border-radius: 24px;
            flex: 1;
            padding: 8px 16px;
            font-size: 14px;
            color: #8696a0;
        }

        /* Floating ID Tag */
        .id-tag {
            position: absolute;
            top: 40px;
            right: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            pointer-events: none;
            z-index: 5;
            letter-spacing: -0.05em;
        }

        .badge-system {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            background: #000;
            color: #fff;
            padding: 1px 5px;
            border-radius: 3px;
            margin-bottom: 4px;
            display: inline-block;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

    <div class="canvas">
        <div class="industrial-bg"></div>
        <div class="grid-overlay"></div>
        <div class="id-tag">AA-147</div>

        <!-- Phone -->
        <div class="phone-frame">
            <div class="phone-screen">
                <div class="wa-header">
                    <div class="avatar">AC</div>
                    <div class="flex-1">
                        <div class="flex items-center text-sm font-bold tracking-tight">
                            Agente Comercial
                            <span class="wa-check">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                                </svg>
                            </span>
                        </div>
                        <div class="text-[10px] opacity-80">En línea</div>
                    </div>
                </div>

                <div class="wa-body">
                    <div class="bubble bubble-left">
                        ¡Atención! Hay un nuevo comprador interesado, comúnicaté con el a este número <b>+598 99 123
                            456</b>.
                        <div class="wa-timestamp">14:02</div>
                    </div>
                </div>

                <div class="wa-input">
                    <div class="input-bar">Responder...</div>
                    <div class="bg-[#00a884] rounded-full p-2.5">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Capture Instructions -->
        <div id="capture-hint"
            class="absolute bottom-6 right-6 text-neutral-400 text-[10px] font-mono bg-white border border-neutral-100 px-3 py-1.5 rounded-full shadow-sm z-50">
            [P] OCULTAR GUÍA | CAPTURA: 1200x675
        </div>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') {
                document.getElementById('capture-hint').style.display = 'none';
            }
        });
    </script>
</body>

</html>
